# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-subbareddy"
BBFILE_PATTERN_meta-subbareddy = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-subbareddy = "6"

LAYERDEPENDS_meta-subbareddy = "core"
LAYERSERIES_COMPAT_meta-subbareddy = "kirkstone"
